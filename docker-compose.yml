services:
  proxy:
    image: nginx:alpine
    container_name: socket-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/logs:/var/log/nginx
    depends_on:
      - web
      - api
    networks:
      - socket_network

  web:
    build: ./frontend
    container_name: socket-frontend
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - socket_network

  api:
    build: ./backend
    container_name: socket-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db-sql
      ELASTIC_URL: http://db-nosql:9200
    depends_on:
      db-sql:
        condition: service_healthy
      db-nosql:
        condition: service_started
    networks:
      - socket_network

  db-sql:
    image: postgres:15
    container_name: socket-postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - socket_network

  db-nosql:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: socket-elasticsearch
    restart: unless-stopped
    env_file:
      - .env
    environment:
      discovery.type: single-node
      xpack.security.enabled: "true"
      xpack.security.http.ssl.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - esdata:/usr/share/elasticsearch/data
    networks:
      - socket_network

  ids-suricata:
    image: jasonish/suricata:latest
    container_name: socket-suricata
    restart: unless-stopped
    profiles:
      - suricata
    network_mode: "service:proxy"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    command:
      - -i
      - eth0
      - -l
      - /var/log/suricata
      - -S
      - /var/lib/suricata/rules/local.rules
      - -k
      - none
    volumes:
      - ./infra/suricata/logs:/var/log/suricata
      - ./infra/suricata/rules:/var/lib/suricata/rules:ro
    depends_on:
      - proxy

networks:
  socket_network:
    driver: bridge

volumes:
  pgdata:
  esdata:
